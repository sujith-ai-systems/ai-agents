name: Deploy · market

# Deploys the Options Market Analyzer agent to its own Cloud Run service.
# Triggers only when this agent's files (or shared deps) change.

on:
  push:
    branches: [main]
    paths:
      - "multi-agents/market/**"
      - "requirements.txt"
      - ".github/workflows/deploy-agent.yml"
      - ".github/workflows/deploy-market.yml"
  workflow_dispatch: {}

# Must be granted at the caller level so the reusable workflow can mint the
# OIDC token used for keyless auth to Google Cloud (Workload Identity Federation).
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-agent.yml
    secrets: inherit
    with:
      service: options-market-analyzer
      directory: multi-agents/market
      region: us-central1
