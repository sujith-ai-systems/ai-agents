name: Trigger deploy

# This is the ONLY workflow in this public repo. It does NOT build or deploy
# anything and prints no infrastructure details. On a push to main that touches
# an agent, it sends a repository_dispatch event to the PRIVATE deploy repo
# (sujith-ai-systems/ai-agents-deploy), which runs the actual Cloud Run deploy.
#
# Requires a repo secret DEPLOY_DISPATCH_TOKEN: a GitHub PAT that can send
# repository_dispatch to the private deploy repo.
#   - Fine-grained PAT: repo = sujith-ai-systems/ai-agents-deploy,
#     permission "Contents: Read and write" (Metadata: Read is auto).
#   - Or classic PAT with "repo" scope.

on:
  push:
    branches: [main]
    paths:
      - "multi-agents/market/**"

permissions:
  contents: read

jobs:
  dispatch-market:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch deploy to private repo
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
        run: |
          gh api \
            repos/sujith-ai-systems/ai-agents-deploy/dispatches \
            -f event_type=deploy-market \
            -f client_payload[code_ref]="${GITHUB_SHA}"
          echo "Dispatched deploy-market (code_ref=${GITHUB_SHA}) to private deploy repo."
