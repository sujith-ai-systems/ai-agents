name: Trigger deploy

# This is the ONLY workflow in this public repo. It does NOT build or deploy
# anything and prints no infrastructure details. On a push to main that touches
# an agent, it sends a repository_dispatch event to the PRIVATE deploy repo
# (sujith-ai-systems/ai-agents-deploy), passing the Cloud Run service name and
# the agent directory. The private repo runs the actual Cloud Run deploy with a
# single, agent-agnostic workflow — so adding a new agent only means adding a
# job here (no change in the private repo).
#
# Requires a repo secret DEPLOY_DISPATCH_TOKEN: a GitHub PAT scoped to the
# private deploy repo with "Contents: Read and write" (or a classic "repo" PAT).

on:
  push:
    branches: [main]
    paths:
      - "multi-agents/**"

permissions:
  contents: read

jobs:
  # Detect which agents changed in this push (reliable git diff, no flaky
  # webhook-payload expressions). Each agent gets a boolean output.
  changes:
    runs-on: ubuntu-latest
    outputs:
      market: ${{ steps.detect.outputs.market }}
      # climate: ${{ steps.detect.outputs.climate }}
    steps:
      - name: Checkout (full history to diff the push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed agents
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          base="$BEFORE"
          # New branch / forced push: 'before' may be all-zeros or missing — fall back to the parent commit.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
          fi
          changed="$(git diff --name-only "$base" HEAD || true)"
          echo "Changed files:"; echo "$changed"
          emit() { if echo "$changed" | grep -q "^$2"; then echo "$1=true" >> "$GITHUB_OUTPUT"; else echo "$1=false" >> "$GITHUB_OUTPUT"; fi; }
          emit market  "multi-agents/market/"
          # emit climate "multi-agents/climate/"

  market:
    needs: changes
    if: ${{ needs.changes.outputs.market == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch deploy (market)
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
        run: |
          gh api repos/sujith-ai-systems/ai-agents-deploy/dispatches \
            -f event_type=deploy \
            -f client_payload[service]=options-market-analyzer \
            -f client_payload[directory]=multi-agents/market \
            -f client_payload[code_ref]="${GITHUB_SHA}"
          echo "Dispatched deploy for options-market-analyzer (code_ref=${GITHUB_SHA})."

  # To add another agent (e.g. climate analysis):
  #   1. Add `climate: ${{ steps.detect.outputs.climate }}` to the `changes` outputs above.
  #   2. Uncomment the matching `emit climate ...` line in the detect step.
  #   3. Copy the job below, setting service + directory.
  #
  # climate:
  #   needs: changes
  #   if: ${{ needs.changes.outputs.climate == 'true' }}
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Dispatch deploy (climate)
  #       env:
  #         GH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
  #       run: |
  #         gh api repos/sujith-ai-systems/ai-agents-deploy/dispatches \
  #           -f event_type=deploy \
  #           -f client_payload[service]=climate-analysis \
  #           -f client_payload[directory]=multi-agents/climate \
  #           -f client_payload[code_ref]="${GITHUB_SHA}"
